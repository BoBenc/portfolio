<section class="section">
    <h2>Projektjeim</h2>
    <p>Itt találhatóak az eddigi fejlesztéseim és munkáim.</p>
    
    <div class="projects-grid">
        <div class="project-card" *ngFor="let project of projectList">
            <img [src]="project.coverImage" alt="Projekt képe" class="project-img" [routerLink]="['/projects', project.id]">
            <h3 class="project-title">{{ project.title }}</h3>
            <p>{{ project.shortDescription }}</p>
            <div class="tech-stack">{{ project.tech }}</div>
            
            <a [routerLink]="['/projects', project.id]" class="btn btn-small outline mt-1">Részletek megtekintése</a>
        </div>
    </div>
</section>
